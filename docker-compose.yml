services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/wp_updater?schema=public
      - SERVER_URL=${SERVER_URL:-http://localhost:3000}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - GITHUB_AUTH_CLIENT_ID=${GITHUB_AUTH_CLIENT_ID}
      - GITHUB_AUTH_CLIENT_SECRET=${GITHUB_AUTH_CLIENT_SECRET}
      - GITHUB_AUTH_ALLOWED_ORG=${GITHUB_AUTH_ALLOWED_ORG}
      - NEXT_PUBLIC_GITHUB_AUTH_ENABLED=${NEXT_PUBLIC_GITHUB_AUTH_ENABLED:-false}
      - GITHUB_APP_ID=${GITHUB_APP_ID}
      - GITHUB_APP_PRIVATE_KEY=${GITHUB_APP_PRIVATE_KEY}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wp_updater
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
